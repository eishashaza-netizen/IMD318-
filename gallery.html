<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background-color:#FFFDD0;
font-family:'Quicksand', sans-serif;
}

nav{
background-color:#f5c2d5;
padding:20px;
text-align:center;
}

nav a{
text-decoration:none;
color:white;
font-size:20px;
font-weight:bold;
margin:20px;
}

.title{
text-align:center;
font-size:70px;
color:#d98ca5;
margin-top:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:20px;
color:#888;
margin-bottom:40px;
}

/* gallery */

.gallery{
column-count:4;
column-gap:20px;
padding:40px;
}

.gallery img{
width:100%;
margin-bottom:20px;
border-radius:20px;
display:block;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.music-player{
text-align:center;
margin-bottom:30px;
}

.music-player button{
background:#f5c2d5;
color:white;
border:none;
padding:12px 25px;
margin:5px;
border-radius:25px;
font-size:18px;
font-family:'Quicksand', sans-serif;
cursor:pointer;
}

.music-player button:hover{
background:#e8a8bf;
}

.music-player p{
color:#d98ca5;
font-size:20px;
font-weight:bold;
}

.slider{
overflow:hidden;
padding:20px;
}

.slide-track{
display:flex;
width:calc(250px * 20);
animation:scroll 30s linear infinite;
}

.slide-track img{
width:220px;
height:300px;
object-fit:cover;
margin:10px;
border-radius:20px;
}

@keyframes scroll{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

</style>

</head>

<body>
