<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jojo's Personal Space</title>

<link rel="shortcut icon" type="image/jpg" href="shaza.jpeg">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background-image:url('pinky.jpeg');
background-size:cover;
background-position:center;
height:100vh;
font-family:'Quicksand', sans-serif;
overflow:hidden;
}

.overlay{
background:rgba(255,255,255,0.15);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.content{
text-align:center;
}

/* profile picture */

.profile{
width:300px;
height:300px;
border-radius:50%;
object-fit:cover;
border:none;
box-shadow:0 0 20px rgba(255,182,193,0.8);
}

/* title */

h1{
font-size:90px;
color:white;
margin:15px 0;
-webkit-text-stroke:2px pink;
}

/* quote */

.tagline{
    font-family: 'Cherry Bomb One', cursive;
    font-size: 32px;
    color: white;
    display: inline-block;
    padding: 10px 25px;
    border-radius: 25px;

    text-shadow:
        -2px -2px 0 #ffb6c1,
         2px -2px 0 #ffb6c1,
        -2px  2px 0 #ffb6c1,
         2px  2px 0 #ffb6c1;
}

/* button */

.button{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#ffb6c1;
color:white;
text-decoration:none;
font-size:22px;
border-radius:40px;
font-weight:bold;
transition:0.3s;
}

.button:hover{
background:#ff8fab;
}

</style>

</head>

<body>

<div class="overlay">

<div class="content">

<img src="baby2.png" class="profile">

<h1>WELCOME TO MY SPACE !</h1>

<p class="tagline">
JUST AN ORDINARY GIRL
</p>

<br>

<a href="about.html" class="button">
LET'S KNOW ABOUT ME!♡
</a>

</div>

</div>

</body>

</html>
